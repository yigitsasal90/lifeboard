<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeBoard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=30">
</head>
<body>
    <header class="topbar">
        <div class="brand-wrap">
            <div>
                <h1>LifeBoard</h1>
                <p>by Yigit · Routine + Winnie + Finance</p>
            </div>

            <button id="themeToggle" class="theme-toggle" type="button" aria-label="Tema değiştir">
                <span class="theme-icon sun">☀️</span>
                <span class="theme-icon moon">🌙</span>
            </button>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const root = document.documentElement;
        const toggle = document.getElementById("themeToggle");
        const savedTheme = localStorage.getItem("lifeboard-theme") || "dark";

        function applyTheme(theme) {
            root.setAttribute("data-theme", theme);
        }

        applyTheme(savedTheme);

        toggle.addEventListener("click", function () {
            const current = root.getAttribute("data-theme");
            const next = current === "dark" ? "light" : "dark";
            localStorage.setItem("lifeboard-theme", next);
            applyTheme(next);
        });

        setInterval(() => {
            window.location.reload();
        }, 60000);
    </script>
</body>
</html>
